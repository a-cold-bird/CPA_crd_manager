services:
  cpa-manager:
    container_name: cpa-manager
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8333:8333"
    environment:
      PORT: "8333"
      CPA_CONFIG_FILE: /app/persist/frontend/config.yaml
    volumes:
      - ./frontend:/app/persist/frontend
      - ./runtime:/app/runtime
    restart: unless-stopped
