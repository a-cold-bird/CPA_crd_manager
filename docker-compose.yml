services:
  cpa-manager:
    container_name: cpa-manager
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8333:8333"
    environment:
      PORT: "8333"
    volumes:
      - ${CPA_CONFIG_FILE:-./frontend/config.example.yaml}:/app/frontend/config.yaml
      - ./runtime:/app/runtime
    restart: unless-stopped
